<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>DeNcHiK Playlist</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at bottom, #0a0f1e 0%, #000000 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      color: #fff;
      position: relative;
    }

    /* Звёзды (статичные + анимация мерцания) */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
      100% {
        opacity: 0;
        transform: scale(0.5);
      }
    }

    /* Основной плеер */
    .player {
      position: relative;
      z-index: 2;
      width: 420px;
      max-width: 95vw;
      background: rgba(10, 20, 40, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 28px 24px 20px;
      box-shadow: 0 20px 50px rgba(0, 150, 255, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: box-shadow 0.3s;
    }

    .player:hover {
      box-shadow: 0 25px 60px rgba(138, 43, 226, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.15);
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #b388ff, #448aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 2px;
      text-shadow: 0 0 25px rgba(179, 136, 255, 0.5);
    }

    .user-badge {
      text-align: center;
      font-size: 13px;
      color: #a0b0d0;
      margin-top: -10px;
      margin-bottom: 4px;
    }

    .upload-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      color: #b0c4ff;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(5px);
    }

    .upload-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(179, 136, 255, 0.6);
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
      color: #e0e0ff;
    }

    .upload-btn input {
      display: none;
    }

    /* Плейлист */
    .playlist {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .playlist::-webkit-scrollbar {
      width: 4px;
    }

    .playlist::-webkit-scrollbar-track {
      background: transparent;
    }

    .playlist::-webkit-scrollbar-thumb {
      background: rgba(138, 43, 226, 0.5);
      border-radius: 4px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      border: 1px solid transparent;
    }

    .track-item:hover {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px rgba(103, 58, 183, 0.3);
      border-color: rgba(179, 136, 255, 0.3);
    }

    .track-item.active {
      background: rgba(123, 31, 162, 0.25);
      border-color: #7b1fa2;
      box-shadow: 0 0 18px rgba(123, 31, 162, 0.5);
    }

    .track-icon {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .track-info {
      flex: 1;
    }

    .track-name {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .track-artist {
      font-size: 12px;
      color: #a0b0d0;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .track-duration {
      font-size: 13px;
      color: #8a9bb5;
      margin-left: auto;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ff5252;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.1s;
    }

    .delete-btn:hover {
      background: rgba(255, 82, 82, 0.2);
    }

    /* Текущий трек и управление */
    .now-playing {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 20px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .current-track-info {
      flex: 1;
    }

    .current-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .current-artist {
      font-size: 12px;
      color: #8899bb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .control-btn {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 16px;
      color: #e0e0ff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 14px rgba(179, 136, 255, 0.5);
    }

    .control-btn.toggle-active {
      background: rgba(179, 136, 255, 0.4);
      color: white;
      box-shadow: 0 0 10px rgba(179, 136, 255, 0.7);
    }

    .progress-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }

    .progress-bar {
      flex: 1;
      height: 5px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #b388ff, #448aff);
      border-radius: 5px;
      transition: width 0.1s linear;
    }

    .time {
      font-size: 11px;
      color: #8899bb;
      min-width: 36px;
      text-align: center;
    }

    /* Громкость */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .volume-slider {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #b388ff;
      border-radius: 50%;
      box-shadow: 0 0 6px #b388ff;
    }

    .empty-message {
      text-align: center;
      color: #5c6a84;
      font-style: italic;
      padding: 20px;
    }

    /* Анимация спектра (audio visualizer) */
    #visualizer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      z-index: 1;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      opacity: 0.5;
    }

    .bar {
      width: 6px;
      background: linear-gradient(to top, #b388ff, #448aff);
      border-radius: 3px 3px 0 0;
      transition: height 0.05s;
    }
  </style>
</head>
<body>
  <div class="stars" id="starsContainer"></div>
  <div id="visualizer"></div>

  <!-- Капча -->
  <div id="cloudflareBlock" class="cf-block" style="display: none;">
    <h2>DeNcHiK Playlist</h2>
    <div id="cfMessage">Проверка браузера...</div>
    <div id="cfCaptcha" style="display: none;">
      <p>Докажите, что вы не бот</p>
      <p id="captchaQuestion"></p>
      <input type="number" id="captchaAnswer" placeholder="Ответ">
      <button id="captchaSubmit">Продолжить</button>
    </div>
  </div>

  <!-- Авторизация -->
  <div id="authBlock" class="auth-container" style="display: none;">
    <h2>DeNcHiK Playlist</h2>
    <input type="text" id="loginInput" placeholder="Логин" autocomplete="off">
    <input type="password" id="passwordInput" placeholder="Пароль">
    <button id="loginBtn">Войти</button>
    <div class="guest-link" id="guestLink">Войти как гость</div>
    <div id="loginError" style="color: #ff5252; font-size: 14px;"></div>
  </div>

  <!-- Плеер -->
  <div id="playerBlock" class="player" style="display: none;">
    <div class="title">♫ DeNcHiK Playlist</div>
    <div class="user-badge" id="userBadge"></div>

    <label class="upload-btn" id="uploadLabel" style="display: none;">
      + Добавить трек (с устройства)
      <input type="file" id="uploadInput" accept="audio/*" multiple>
    </label>

    <div class="playlist" id="playlistContainer">
      <div class="empty-message">Пока нет треков ✦</div>
    </div>

    <div class="now-playing">
      <div class="current-track-info">
        <div class="current-name" id="currentTitle">Не выбрано</div>
        <div class="current-artist" id="currentArtist">—</div>
      </div>
      <div class="controls">
        <button class="control-btn" id="shuffleBtn" title="Shuffle">🔀</button>
        <button class="control-btn" id="prevBtn">❮❮</button>
        <button class="control-btn" id="playBtn">▶</button>
        <button class="control-btn" id="nextBtn">❯❯</button>
        <button class="control-btn" id="repeatBtn" title="Repeat">🔁</button>
      </div>
    </div>

    <div class="progress-container">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time" id="durationTime">0:00</span>
    </div>

    <div class="volume-container">
      <span style="font-size: 14px;">🔈</span>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
      <button class="control-btn" id="muteBtn" title="Mute">🔇</button>
    </div>
  </div>

  <audio id="audioPlayer" crossorigin="anonymous"></audio>

  <script>
    (function() {
      // ----- КОНФИГ: ваши треки из папки music -----
      const defaultTracks = [
        { name: "азгуманизм", artist: "Неизвестен", url: "music/азгуманизм.m4a" },
        { name: "басс да да hardtekk", artist: "Неизвестен", url: "music/басс да да hardtekk.m4a" },
        { name: "Код Гиасс speed", artist: "Неизвестен", url: "music/Код Гиасс speed.m4a" },
        { name: "мэнчик", artist: "Неизвестен", url: "music/мэнчик.m4a" },
        { name: "правдивая", artist: "Неизвестен", url: "music/правдивая.m4a" },
        { name: "хз", artist: "Неизвестен", url: "music/хз.mp3" }
      ];

      // ------------------ Визуализатор ------------------
      const visualizer = document.getElementById('visualizer');
      const BAR_COUNT = 48;
      let bars = [];
      for (let i = 0; i < BAR_COUNT; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        visualizer.appendChild(bar);
        bars.push(bar);
      }

      let audioContext = null;
      let analyser = null;
      let dataArray = null;

      async function initAudioContext() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 128;
          const source = audioContext.createMediaElementSource(audioPlayer);
          source.connect(analyser);
          analyser.connect(audioContext.destination);
          dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audioContext.state === 'suspended') await audioContext.resume();
      }

      function updateVisualizer() {
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        const step = Math.floor(dataArray.length / BAR_COUNT);
        for (let i = 0; i < BAR_COUNT; i++) {
          const value = dataArray[i * step] || 0;
          const height = Math.max(4, (value / 255) * 60);
          bars[i].style.height = height + 'px';
        }
        requestAnimationFrame(updateVisualizer);
      }

      // ------------------ Звёзды ------------------
      const starsContainer = document.getElementById('starsContainer');
      for (let i = 0; i < 140; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 4 + 3) + 's');
        star.style.animationDelay = Math.random() * 5 + 's';
        starsContainer.appendChild(star);
      }

      // ------------------ Элементы ------------------
      const cloudflareBlock = document.getElementById('cloudflareBlock');
      const cfMessage = document.getElementById('cfMessage');
      const cfCaptcha = document.getElementById('cfCaptcha');
      const captchaQuestion = document.getElementById('captchaQuestion');
      const captchaAnswer = document.getElementById('captchaAnswer');
      const captchaSubmit = document.getElementById('captchaSubmit');

      const authBlock = document.getElementById('authBlock');
      const playerBlock = document.getElementById('playerBlock');
      const loginInput = document.getElementById('loginInput');
      const passwordInput = document.getElementById('passwordInput');
      const loginBtn = document.getElementById('loginBtn');
      const guestLink = document.getElementById('guestLink');
      const loginError = document.getElementById('loginError');
      const userBadge = document.getElementById('userBadge');
      const uploadLabel = document.getElementById('uploadLabel');

      const uploadInput = document.getElementById('uploadInput');
      const playlistContainer = document.getElementById('playlistContainer');
      const audioPlayer = document.getElementById('audioPlayer');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const shuffleBtn = document.getElementById('shuffleBtn');
      const repeatBtn = document.getElementById('repeatBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const currentTimeSpan = document.getElementById('currentTime');
      const durationTimeSpan = document.getElementById('durationTime');
      const currentTitleEl = document.getElementById('currentTitle');
      const currentArtistEl = document.getElementById('currentArtist');
      const volumeSlider = document.getElementById('volumeSlider');
      const muteBtn = document.getElementById('muteBtn');

      let tracks = [];
      let currentTrackIndex = -1;
      let isPlaying = false;
      let isAdmin = false;
      let shuffleMode = false;
      let repeatMode = 0; // 0 - no repeat, 1 - repeat one, 2 - repeat all
      let previousVolume = 0.8;

      const CORRECT_USERNAME = 'Denchik';
      const CORRECT_PASSWORD = '@92,%*÷[×[*@;=*[(=*=&÷&×>[×[>#&$&#&÷&<÷<÷<÷<÷<>#&jsjsjejwo';

      // Rate limiting
      function getRateLimit() {
        try { return JSON.parse(localStorage.getItem('login_rate') || '{}'); } catch(e) { return {}; }
      }
      function setRateLimit(data) { localStorage.setItem('login_rate', JSON.stringify(data)); }
      function checkRateLimit() {
        const rl = getRateLimit();
        if (rl.blockUntil && Date.now() < rl.blockUntil) {
          const sec = Math.ceil((rl.blockUntil - Date.now()) / 1000);
          return { blocked: true, seconds: sec };
        }
        return { blocked: false };
      }
      function recordFailedAttempt() {
        const rl = getRateLimit();
        rl.attempts = (rl.attempts || 0) + 1;
        if (rl.attempts >= 3) {
          rl.blockUntil = Date.now() + 30000;
          rl.attempts = 0;
        }
        setRateLimit(rl);
      }
      function resetRateLimit() { localStorage.removeItem('login_rate'); }

      // Облачная проверка
      function checkCloudflare() {
        if (sessionStorage.getItem('cf_verified') === '1') {
          cloudflareBlock.style.display = 'none';
          checkSession();
          return;
        }
        cloudflareBlock.style.display = 'flex';
        cfMessage.style.display = 'block';
        cfCaptcha.style.display = 'none';
        setTimeout(() => {
          cfMessage.style.display = 'none';
          cfCaptcha.style.display = 'block';
          generateCaptcha();
        }, 1500);
      }

      let captchaNum1, captchaNum2;
      function generateCaptcha() {
        captchaNum1 = Math.floor(Math.random() * 10) + 1;
        captchaNum2 = Math.floor(Math.random() * 10) + 1;
        captchaQuestion.textContent = `${captchaNum1} + ${captchaNum2} = ?`;
        captchaAnswer.value = '';
      }

      captchaSubmit.addEventListener('click', () => {
        const ans = parseInt(captchaAnswer.value);
        if (ans === captchaNum1 + captchaNum2) {
          sessionStorage.setItem('cf_verified', '1');
          cloudflareBlock.style.display = 'none';
          checkSession();
        } else {
          alert('Неверный ответ, попробуйте ещё раз');
          generateCaptcha();
        }
      });

      function checkSession() {
        const session = sessionStorage.getItem('denchik_session');
        if (session) {
          const data = JSON.parse(session);
          if (data.username === CORRECT_USERNAME && data.password === CORRECT_PASSWORD) {
            isAdmin = true;
            showPlayer('Denchik (админ)');
          } else {
            isAdmin = false;
            showPlayer(data.username || 'Гость');
          }
        } else {
          authBlock.style.display = 'flex';
          playerBlock.style.display = 'none';
          loginError.textContent = '';
        }
      }

      function saveSession(username, password) {
        sessionStorage.setItem('denchik_session', JSON.stringify({ username, password }));
      }

      function clearSession() {
        sessionStorage.removeItem('denchik_session');
      }

      function showPlayer(displayName) {
        authBlock.style.display = 'none';
        playerBlock.style.display = 'flex';
        userBadge.textContent = displayName;
        uploadLabel.style.display = isAdmin ? 'block' : 'none';
        renderPlaylist();
        updateShuffleButton();
        updateRepeatButton();
        // Загрузить стандартные треки при первом входе
        if (tracks.length === 0) {
          loadDefaultTracks();
        }
      }

      function loadDefaultTracks() {
        defaultTracks.forEach(t => {
          tracks.push({
            id: Date.now() + Math.random(),
            fileURL: encodeURI(t.url),
            name: t.name,
            artist: t.artist,
            duration: 0
          });
        });
        saveTracksMeta();
        renderPlaylist();
      }

      // Логин
      loginBtn.addEventListener('click', () => {
        const rlCheck = checkRateLimit();
        if (rlCheck.blocked) {
          loginError.textContent = `Слишком много попыток. Подождите ${rlCheck.seconds} сек.`;
          return;
        }
        const username = loginInput.value.trim();
        const password = passwordInput.value.trim();
        if (!username) return;

        if (username === CORRECT_USERNAME && password === CORRECT_PASSWORD) {
          isAdmin = true;
          saveSession(username, password);
          resetRateLimit();
          showPlayer('Denchik (админ)');
          loginError.textContent = '';
        } else {
          recordFailedAttempt();
          loginError.textContent = 'Неверный логин или пароль';
        }
      });

      guestLink.addEventListener('click', () => {
        isAdmin = false;
        clearSession();
        showPlayer('Гость');
      });

      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loginBtn.click();
      });

      // Плеерные функции
      function saveTracksMeta() {
        const meta = tracks.map(t => ({ id: t.id, name: t.name, artist: t.artist, duration: t.duration, url: t.fileURL }));
        localStorage.setItem('spacePlayerTracks', JSON.stringify(meta));
      }

      function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      }

      function updateNowPlaying() {
        if (currentTrackIndex >= 0 && tracks[currentTrackIndex]) {
          const track = tracks[currentTrackIndex];
          currentTitleEl.textContent = track.name || 'Без названия';
          currentArtistEl.textContent = track.artist || 'Неизвестный исполнитель';
          audioPlayer.src = track.fileURL;
          audioPlayer.load();
          if (isPlaying) {
            audioPlayer.play().catch(() => {});
            initAudioContext().then(() => updateVisualizer());
          }
        } else {
          currentTitleEl.textContent = 'Не выбрано';
          currentArtistEl.textContent = '—';
          audioPlayer.src = '';
        }
      }

      function renderPlaylist() {
        playlistContainer.innerHTML = '';
        if (tracks.length === 0) {
          playlistContainer.innerHTML = '<div class="empty-message">Пока нет треков ✦</div>';
          return;
        }

        tracks.forEach((track, index) => {
          const item = document.createElement('div');
          item.className = 'track-item' + (index === currentTrackIndex ? ' active' : '');
          item.innerHTML = `
            <div class="track-icon">♫</div>
            <div class="track-info">
              <div class="track-name">${track.name || 'Без названия'}</div>
              <div class="track-artist">${track.artist || 'Неизвестный исполнитель'}</div>
            </div>
            <span class="track-duration">${formatTime(track.duration || 0)}</span>
            ${isAdmin ? `<button class="delete-btn" data-index="${index}">✕</button>` : ''}
          `;

          item.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-btn')) return;
            currentTrackIndex = index;
            isPlaying = true;
            updateNowPlaying();
            playBtn.textContent = '❚❚';
            renderPlaylist();
          });

          if (isAdmin) {
            item.querySelector('.delete-btn').addEventListener('click', (e) => {
              e.stopPropagation();
              URL.revokeObjectURL(tracks[index].fileURL);
              tracks.splice(index, 1);
              if (currentTrackIndex === index) {
                if (tracks.length === 0) {
                  currentTrackIndex = -1;
                  isPlaying = false;
                  audioPlayer.pause();
                  audioPlayer.src = '';
                  playBtn.textContent = '▶';
                } else if (currentTrackIndex >= tracks.length) {
                  currentTrackIndex = tracks.length - 1;
                }
                updateNowPlaying();
              } else if (currentTrackIndex > index) {
                currentTrackIndex--;
              }
              saveTracksMeta();
              renderPlaylist();
            });
          }

          playlistContainer.appendChild(item);
        });
      }

      uploadInput.addEventListener('change', (e) => {
        if (!isAdmin) return;
        const files = Array.from(e.target.files);
        files.forEach(file => {
          if (!file.type.startsWith('audio/')) return;
          const url = URL.createObjectURL(file);
          const track = {
            id: Date.now() + Math.random(),
            fileURL: url,
            name: file.name.replace(/\.[^/.]+$/, ''),
            artist: 'Загруженный трек',
            duration: 0,
          };
          tracks.push(track);

          const tempAudio = new Audio();
          tempAudio.src = url;
          tempAudio.addEventListener('loadedmetadata', () => {
            track.duration = tempAudio.duration;
            renderPlaylist();
            saveTracksMeta();
          });
        });
        uploadInput.value = '';
        saveTracksMeta();
        renderPlaylist();
      });

      playBtn.addEventListener('click', () => {
        if (tracks.length === 0) return;
        if (currentTrackIndex === -1) {
          currentTrackIndex = 0;
          updateNowPlaying();
          isPlaying = true;
          playBtn.textContent = '❚❚';
          renderPlaylist();
          audioPlayer.play();
        } else {
          if (audioPlayer.paused) {
            audioPlayer.play();
            isPlaying = true;
            playBtn.textContent = '❚❚';
          } else {
            audioPlayer.pause();
            isPlaying = false;
            playBtn.textContent = '▶';
          }
        }
      });

      function playNext() {
        if (tracks.length === 0) return;
        if (shuffleMode) {
          const randomIndex = Math.floor(Math.random() * tracks.length);
          currentTrackIndex = (randomIndex === currentTrackIndex && tracks.length > 1)
            ? (randomIndex + 1) % tracks.length : randomIndex;
        } else {
          if (currentTrackIndex < tracks.length - 1) currentTrackIndex++;
          else if (repeatMode === 2) currentTrackIndex = 0;
          else {
            isPlaying = false;
            playBtn.textContent = '▶';
            return;
          }
        }
        isPlaying = true;
        updateNowPlaying();
        playBtn.textContent = '❚❚';
        renderPlaylist();
        audioPlayer.play();
      }

      prevBtn.addEventListener('click', () => {
        if (tracks.length === 0) return;
        if (shuffleMode) {
          currentTrackIndex = Math.floor(Math.random() * tracks.length);
        } else {
          if (currentTrackIndex > 0) currentTrackIndex--;
          else currentTrackIndex = tracks.length - 1;
        }
        isPlaying = true;
        updateNowPlaying();
        playBtn.textContent = '❚❚';
        renderPlaylist();
        audioPlayer.play();
      });

      nextBtn.addEventListener('click', playNext);

      // Shuffle
      shuffleBtn.addEventListener('click', () => {
        shuffleMode = !shuffleMode;
        updateShuffleButton();
      });
      function updateShuffleButton() {
        if (shuffleMode) shuffleBtn.classList.add('toggle-active');
        else shuffleBtn.classList.remove('toggle-active');
      }

      // Repeat
      repeatBtn.addEventListener('click', () => {
        repeatMode = (repeatMode + 1) % 3;
        updateRepeatButton();
      });
      function updateRepeatButton() {
        if (repeatMode === 0) {
          repeatBtn.classList.remove('toggle-active');
          repeatBtn.textContent = '🔁';
        } else if (repeatMode === 1) {
          repeatBtn.classList.add('toggle-active');
          repeatBtn.textContent = '🔂';
        } else if (repeatMode === 2) {
          repeatBtn.classList.add('toggle-active');
          repeatBtn.textContent = '🔁';
        }
      }

      // Громкость
      volumeSlider.addEventListener('input', () => {
        audioPlayer.volume = volumeSlider.value;
        if (audioPlayer.volume > 0) {
          muteBtn.textContent = '🔊';
        } else {
          muteBtn.textContent = '🔇';
        }
      });
      muteBtn.addEventListener('click', () => {
        if (audioPlayer.volume > 0) {
          previousVolume = audioPlayer.volume;
          audioPlayer.volume = 0;
          volumeSlider.value = 0;
          muteBtn.textContent = '🔇';
        } else {
          audioPlayer.volume = previousVolume || 0.8;
          volumeSlider.value = audioPlayer.volume;
          muteBtn.textContent = '🔊';
        }
      });

      // Обновление прогресса и длительности
      audioPlayer.addEventListener('timeupdate', () => {
        const current = audioPlayer.currentTime;
        const duration = audioPlayer.duration;
        if (duration && !isNaN(duration)) {
          const percent = (current / duration) * 100;
          progressFill.style.width = percent + '%';
          currentTimeSpan.textContent = formatTime(current);
          durationTimeSpan.textContent = formatTime(duration);
        }
      });
      audioPlayer.addEventListener('loadedmetadata', () => {
        durationTimeSpan.textContent = formatTime(audioPlayer.duration);
        if (currentTrackIndex >= 0 && tracks[currentTrackIndex]) {
          tracks[currentTrackIndex].duration = audioPlayer.duration;
          saveTracksMeta();
          renderPlaylist();
        }
      });
      audioPlayer.addEventListener('ended', () => {
        if (repeatMode === 1) {
          audioPlayer.currentTime = 0;
          audioPlayer.play();
        } else {
          playNext();
        }
      });
      progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        const duration = audioPlayer.duration;
        if (duration) audioPlayer.currentTime = (clickX / width) * duration;
      });

      // Инициализация
      checkCloudflare();

      window.addEventListener('beforeunload', () => {
        tracks.forEach(t => {
          if (t.fileURL.startsWith('blob:')) URL.revokeObjectURL(t.fileURL);
        });
      });
    })();
  </script>
</body>
</html>
